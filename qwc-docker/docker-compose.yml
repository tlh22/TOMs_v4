  #     SERVICE_MOUNTPOINT: '/api/v1/tileinfo'
  #   volumes:
  #     - ./pg_service.conf:/srv/pg_service.conf:ro
  #     - ./volumes/config:/srv/qwc_service/config:ro
  #     - ./volumes/qgs-resources:/data:ro
  #   logging: *default-logging

  # qwc-oblique-imagery-service:
  #   image: docker.io/sourcepole/qwc-oblique-imagery-service:latest-2026-lts
  #   container_name: qwc-oblique-imagery-service
  #   restart: unless-stopped
  #   environment:
  #     <<: *qwc-service-variables
  #     SERVICE_MOUNTPOINT: '/api/v1/oblique-imagery'
  #   volumes:
  #     - ./volumes/config:/srv/qwc_service/config:ro
  #     - ./volumes/oblique-images:/images:ro
  #   logging: *default-logging

  # qwc-registration-gui:
  #   image: sourcepole/qwc-registration-gui:latest-2026-lts
  #   container_name: qwc-registration-gui
  #   restart: unless-stopped
  #   environment:
  #     <<: *qwc-service-variables
  #     SERVICE_MOUNTPOINT: '/registration'
  #     DEFAULT_LOCALE: 'en'
  #     ADMIN_RECIPIENTS: 'admin@example.com'
  #     MAIL_SUPPRESS_SEND: 'False'
  #     MAIL_DEFAULT_SENDER: 'from@example.com'
  #   volumes:
  #     - ./pg_service.conf:/srv/pg_service.conf:ro
  #   logging: *default-logging

networks:
  toms-net:
    name: toms_net
    external: true
