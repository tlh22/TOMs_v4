server {
    listen      80;
    server_name localhost;

    # ── Security headers ─────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Timeouts & body size ─────────────────────────────────
    proxy_read_timeout    90s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    90s;
    client_max_body_size  10M;

    # ── Common proxy headers ──────────────────────────────────
    proxy_redirect     off;
    proxy_http_version 1.1;
    proxy_set_header   Host              $http_host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    # ── Health check ──────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ════════════════════════════════════════════════════════
    # NON-TENANT ROUTES — QWC2 calls these without a tenant prefix
    # Must set Tenant header so services know which config to load
    # ════════════════════════════════════════════════════════

    location ~ ^/ows(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-ogc-service:9090/ows$path$is_args$args;
    }

    location ~ ^/api/v1/data(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-data-service:9090/api/v1/data$path$is_args$args;
    }

    location ~ ^/api/v1/document(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-document-service:9090/api/v1/document$path$is_args$args;
    }

    location ~ ^/api/v1/elevation(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-elevation-service:9090/api/v1/elevation$path$is_args$args;
    }

    location ~ ^/api/v1/featureinfo(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-feature-info-service:9090/api/v1/featureinfo$path$is_args$args;
    }

    location ~ ^/api/v1/legend(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-legend-service:9090/api/v1/legend$path$is_args$args;
    }

    location ~ ^/api/v1/mapinfo(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-mapinfo-service:9090/api/v1/mapinfo$path$is_args$args;
    }

    location ~ ^/api/v1/permalink(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-permalink-service:9090/api/v1/permalink$path$is_args$args;
    }

    location ~ ^/api/v1/print(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-print-service:9090/api/v1/print$path$is_args$args;
    }

    location ~ ^/api/v2/search(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-fulltext-search-service:9090/api/v2/search$path$is_args$args;
    }

    location ~ ^/auth/(.*) {
        set $path $1;
        proxy_set_header Tenant default;
        proxy_pass http://qwc-auth-service:9090/auth/$path$is_args$args;
    }

    # ════════════════════════════════════════════════════════
    # TENANT-PREFIXED ROUTES  /<tenant>/...
    # ════════════════════════════════════════════════════════

    # Admin GUI — must be before catch-all viewer
    location ~ ^/([^/]+)/qwc_admin {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(qwc_admin.*) /$1 break;
        proxy_pass http://qwc-admin-gui:9090;
    }

    location ~ ^/([^/]+)/auth/ {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(auth/.*) /$1 break;
        proxy_pass http://qwc-auth-service:9090;
    }

    location ~ ^/([^/]+)/ows {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(ows.*) /$1 break;
        proxy_pass http://qwc-ogc-service:9090;
    }

    location ~ ^/([^/]+)/api/v1/data {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(api/v1/data.*) /$1 break;
        proxy_pass http://qwc-data-service:9090;
    }

    location ~ ^/([^/]+)/api/v1/document {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(api/v1/document.*) /$1 break;
        proxy_pass http://qwc-document-service:9090;
    }

    location ~ ^/([^/]+)/api/v1/elevation {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(api/v1/elevation.*) /$1 break;
        proxy_pass http://qwc-elevation-service:9090;
    }

    location ~ ^/([^/]+)/api/v1/featureinfo {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(api/v1/featureinfo.*) /$1 break;
        proxy_pass http://qwc-feature-info-service:9090;
    }

    location ~ ^/([^/]+)/api/v1/legend {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(api/v1/legend.*) /$1 break;
        proxy_pass http://qwc-legend-service:9090;
    }

    location ~ ^/([^/]+)/api/v1/mapinfo {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(api/v1/mapinfo.*) /$1 break;
        proxy_pass http://qwc-mapinfo-service:9090;
    }

    location ~ ^/([^/]+)/api/v1/permalink {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(api/v1/permalink.*) /$1 break;
        proxy_pass http://qwc-permalink-service:9090;
    }

    location ~ ^/([^/]+)/api/v1/print {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(api/v1/print.*) /$1 break;
        proxy_pass http://qwc-print-service:9090;
    }

    location ~ ^/([^/]+)/api/v2/search {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(api/v2/search.*) /$1 break;
        proxy_pass http://qwc-fulltext-search-service:9090;
    }

    # Map Viewer catch-all — must be last tenant route
    location ~ ^/([^/]+)/ {
        set $tenant $1;
        proxy_set_header Tenant $tenant;
        rewrite ^/[^/]+/(.*) /$1 break;
        proxy_pass http://qwc-map-viewer:9090;
    }

    # ── Fallback ──────────────────────────────────────────────
    location / {
        return 404;
    }
}