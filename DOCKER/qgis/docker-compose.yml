# Multi-version QGIS launcher for TOMs. Version is set in .env (QGIS_VERSION + BASE_IMAGE).
# (Omitting obsolete top-level "version" for Compose V2.)
# User workflow: edit .env if needed, then docker compose build && docker compose up -d

services:
  qgis:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - QGIS_VERSION=${QGIS_VERSION:-3.22}
        - BASE_IMAGE=${BASE_IMAGE:-debian:bookworm-slim}
        - USER_ID=${UID}
        - GROUP_ID=${GID}
    image: toms-qgis:${QGIS_VERSION:-3.22}
    container_name: toms-qgis-${QGIS_VERSION:-3.22}
    user: "${UID}:${GID}"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_INDIRECT=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - QT_QUICK_BACKEND=software
      - QT_XCB_GL_INTEGRATION=none
      - QTWEBENGINE_DISABLE_SANDBOX=1
      - PGSERVICEFILE=/home/qgisuser/.pg_service.conf
      - QGIS_CUSTOM_CONFIG_PATH=/home/qgisuser/qgis_data
      - TOMs_CONFIG_PATH=/home/qgisuser/qgis_data/profiles/default/python/plugins/TOMs/QGIS
      - TOMs_FORM_PATH=/home/qgisuser/qgis_data/profiles/default/python/plugins/TOMs/ui
      # Writable log dir for TOMs plugin (plugin dir is mounted read-only)
      - QGIS_LOGFILE_PATH=/home/qgisuser/log_files
      # VNC only for Mac (1). On Windows/Linux set USE_VNC=0 in .env so QGIS uses host display.
      - USE_VNC=${USE_VNC:-1}

    ports:
      - "6080:6080"
      - "5900:5900"

    volumes:
      - ./qgis_config/profiles/${QGIS_PROFILE}:/home/qgisuser/qgis_data
      - ../..:/home/qgisuser/qgis_data/profiles/default/python/plugins/TOMs:ro
      - ./qgis_config/toms_plugin_logs/${QGIS_PROFILE}:/home/qgisuser/qgis_data/profiles/default/python/plugins/TOMs/logs
      - ../../projects:/home/qgisuser/projects
      - ../pg_service/.pg_service.conf:/home/qgisuser/.pg_service.conf:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
    restart: unless-stopped

networks:
  default:
    name: toms_net
    external: true
