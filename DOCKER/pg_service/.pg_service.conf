#
#	Connection configuration file
#
# A service is a set of named connection parameters.  You may specify
# multiple services in this file.  Each starts with a service name in
# brackets.  Subsequent lines have connection configuration parameters of
# the pattern "param=value" or LDAP URLs starting with "ldap://"
# to look up such parameters.  A sample configuration for postgres is
# included in this file.  Lines beginning with '#' are comments.
#
# Copy this to your sysconf directory (typically /usr/local/pgsql/etc) and
# rename it pg_service.conf.
#
# From host (docker port 5435): use TOMs_Test_host or override: psql "port=5435 host=localhost dbname=TOMs_Test user=..." 
# From another container (same network): use TOMs_Test (host toms_postgis, port 5432)
[TOMs_Test]
host=toms_postgis
port=5432
dbname=TOMs_Test
user=toms.operator
password=password

# [TOMs_Test_host]
# host=localhost
# port=5435
# dbname=TOMs_Test
# user=toms.operator
# password=password
